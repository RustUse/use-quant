[workspace]
release = false
release_always = false
changelog_update = false
pr_labels = ["release"]
max_analyze_commits = 2000

[[package]]
name = "use-market-price"
release = true
version_group = "rustuse-quant"

[[package]]
name = "use-return"
release = true
version_group = "rustuse-quant"

[[package]]
name = "use-bar"
